<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Contas - LOCKS</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Import Map para gerenciar dependências do React e Lucide -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.263.1"
        }
    }
    </script>
    
    <!-- Babel para compilar JSX no navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Animações customizadas */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
            LayoutDashboard, FileText, CreditCard, Settings, Bell, Plus, 
            Search, Filter, CheckCircle2, AlertCircle, Clock, MoreVertical, 
            Building2, Calendar, DollarSign, Webhook, X, Loader2, Download, 
            ChevronDown, Users, Phone, Mail
        } from 'lucide-react';

        // --- Mock Data ---
        const MOCK_COMPANIES = [
            { id: 1, name: 'Matriz', cnpj: '12.345.678/0001-90' },
            { id: 2, name: 'Fazenda Guapirama', cnpj: '98.765.432/0001-11' },
            { id: 3, name: 'Fazenda Nebraska', cnpj: '45.123.789/0001-22' },
            { id: 4, name: 'Fazenda Globo', cnpj: '76.543.210/0001-33' }
        ];

        const INITIAL_SUPPLIERS = [
            { id: 1, name: 'Vivo Empresas', category: 'Telecom', contact: '0800 15 15 15', email: 'contas@vivo.com.br', active: true },
            { id: 2, name: 'CEMIG Energia', category: 'Energia', contact: '116', email: 'faleconosco@cemig.com.br', active: true },
            { id: 3, name: 'Thomson Reuters', category: 'Software', contact: '(11) 3003-0000', email: 'financeiro@thomson.com', active: true },
            { id: 4, name: 'Posto Ipiranga', category: 'Combustível', contact: '(65) 3333-4444', email: 'posto.fazenda@ipiranga.com', active: true },
            { id: 5, name: 'AWS Cloud', category: 'Infraestrutura', contact: 'Suporte Online', email: 'billing@aws.com', active: true },
            { id: 6, name: 'John Deere Peças', category: 'Manutenção', contact: '(66) 9999-8888', email: 'pecas@johndeere.com', active: true },
            { id: 7, name: 'Totvs', category: 'Software', contact: '0800 70 70 70', email: 'renovacao@totvs.com.br', active: true },
        ];

        const INITIAL_INVOICES = [
            { id: 1, supplier: 'Vivo Empresas', companyId: 2, amount: 890.50, dueDate: '2025-01-08', status: 'pending', category: 'Telecom' },
            { id: 2, supplier: 'CEMIG Energia', companyId: 2, amount: 3200.00, dueDate: '2025-01-03', status: 'overdue', category: 'Energia' },
            { id: 3, supplier: 'Thomson Reuters', companyId: 1, amount: 1500.00, dueDate: '2025-01-05', status: 'overdue', category: 'Software' },
            { id: 4, supplier: 'Posto Ipiranga', companyId: 3, amount: 450.00, dueDate: '2025-01-15', status: 'pending', category: 'Combustível' },
            { id: 5, supplier: 'AWS Cloud', companyId: 1, amount: 120.00, dueDate: '2025-01-20', status: 'pending', category: 'Infraestrutura' },
            { id: 6, supplier: 'John Deere Peças', companyId: 4, amount: 12500.00, dueDate: '2025-01-10', status: 'pending', category: 'Manutenção' },
            { id: 7, supplier: 'Totvs', companyId: 1, amount: 5600.00, dueDate: '2025-01-01', status: 'paid', category: 'Software' },
        ];

        const MOCK_WEBHOOKS = [
            { id: 1, name: 'N8N - Alerta WhatsApp', url: 'https://n8n.seudominio.com/webhook/vencimento', events: ['fatura.vencendo'], active: true, lastTrigger: 'Hoje 07:00' },
            { id: 2, name: 'Slack Financeiro', url: 'https://hooks.slack.com/services/T000/B000/XXX', events: ['fatura.atrasada', 'resumo.diario'], active: true, lastTrigger: 'Hoje 08:30' },
            { id: 3, name: 'ERP SAP (Integração)', url: 'https://api.sap-gateway.corp/financeiro/baixa', events: ['fatura.paga'], active: false, lastTrigger: '05/01 14:00' }
        ];

        // --- Componentes Auxiliares ---

        const StatusBadge = ({ status }) => {
            const styles = {
                paid: 'bg-green-100 text-green-800 border-green-200',
                pending: 'bg-yellow-100 text-yellow-800 border-yellow-200',
                overdue: 'bg-red-100 text-red-800 border-red-200'
            };
            const labels = {
                paid: 'Pago',
                pending: 'Pendente',
                overdue: 'Atrasado'
            };
            return (
                <span className={`px-2.5 py-0.5 rounded-full text-xs font-medium border ${styles[status]}`}>
                    {labels[status]}
                </span>
            );
        };

        const formatCurrency = (value) => {
            return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value);
        };

        const formatDate = (dateString) => {
            if (!dateString) return '-';
            const [year, month, day] = dateString.split('-');
            return `${day}/${month}`;
        };

        // --- App Principal ---

        function App() {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [invoices, setInvoices] = useState(INITIAL_INVOICES);
            const [suppliers, setSuppliers] = useState(INITIAL_SUPPLIERS);
            const [selectedCompany, setSelectedCompany] = useState('all');
            const [searchTerm, setSearchTerm] = useState('');
            
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isSupplierModalOpen, setIsSupplierModalOpen] = useState(false);
            const [toast, setToast] = useState(null);
            const [testingWebhookId, setTestingWebhookId] = useState(null);

            const [newInvoiceData, setNewInvoiceData] = useState({
                supplier: '', amount: '', dueDate: '', companyId: 1, category: 'Outros'
            });

            const [newSupplierData, setNewSupplierData] = useState({
                name: '', category: 'Outros', contact: '', email: ''
            });

            // --- Lógica ---

            const showToast = (message, type = 'success') => {
                setToast({ message, type });
                setTimeout(() => setToast(null), 3000);
            };

            const stats = {
                overdue: invoices.filter(i => i.status === 'overdue').reduce((acc, curr) => acc + curr.amount, 0),
                pending: invoices.filter(i => i.status === 'pending').reduce((acc, curr) => acc + curr.amount, 0),
                paid: invoices.filter(i => i.status === 'paid').reduce((acc, curr) => acc + curr.amount, 0),
                countOverdue: invoices.filter(i => i.status === 'overdue').length
            };

            const handleStatusChange = (id, newStatus) => {
                setInvoices(invoices.map(inv => inv.id === id ? { ...inv, status: newStatus } : inv));
                let msg = 'Status atualizado com sucesso!';
                if (newStatus === 'paid') msg = 'Pagamento registrado!';
                if (newStatus === 'overdue') msg = 'Marcado como atrasado.';
                showToast(msg);
            };

            const handleAddInvoice = (e) => {
                e.preventDefault();
                const newInvoice = {
                    id: invoices.length + 1,
                    supplier: newInvoiceData.supplier,
                    amount: parseFloat(newInvoiceData.amount),
                    dueDate: newInvoiceData.dueDate,
                    companyId: parseInt(newInvoiceData.companyId),
                    category: newInvoiceData.category,
                    status: 'pending'
                };
                setInvoices([newInvoice, ...invoices]);
                setIsModalOpen(false);
                setNewInvoiceData({ supplier: '', amount: '', dueDate: '', companyId: 1, category: 'Outros' });
                showToast('Fatura adicionada com sucesso!');
            };

            const handleAddSupplier = (e) => {
                e.preventDefault();
                const newSupplier = {
                    id: suppliers.length + 1,
                    ...newSupplierData,
                    active: true
                };
                setSuppliers([...suppliers, newSupplier]);
                setIsSupplierModalOpen(false);
                setNewSupplierData({ name: '', category: 'Outros', contact: '', email: '' });
                showToast('Fornecedor cadastrado com sucesso!');
            };

            const handleTestWebhook = (id) => {
                setTestingWebhookId(id);
                setTimeout(() => {
                    setTestingWebhookId(null);
                    showToast('Webhook testado com sucesso!', 'success');
                }, 1500);
            };

            const filteredInvoices = invoices.filter(inv => {
                const matchesCompany = selectedCompany === 'all' || inv.companyId === parseInt(selectedCompany);
                const matchesSearch = inv.supplier.toLowerCase().includes(searchTerm.toLowerCase()) || 
                                      inv.category.toLowerCase().includes(searchTerm.toLowerCase());
                return matchesCompany && matchesSearch;
            });

            const filteredSuppliers = suppliers.filter(sup => 
                sup.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                sup.category.toLowerCase().includes(searchTerm.toLowerCase())
            );

            return (
                <div className="min-h-screen bg-slate-50 flex font-sans text-slate-800 relative">
                    
                    {/* Toast */}
                    {toast && (
                        <div className="fixed bottom-4 right-4 bg-slate-800 text-white px-4 py-3 rounded-lg shadow-lg flex items-center gap-2 z-50 animate-in">
                            <CheckCircle2 className="w-4 h-4 text-emerald-400" />
                            <span className="text-sm font-medium">{toast.message}</span>
                        </div>
                    )}

                    {/* Modal Nova Despesa */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-white rounded-xl shadow-xl w-full max-w-md overflow-hidden animate-in">
                                <div className="p-4 border-b border-slate-100 flex items-center justify-between bg-slate-50">
                                    <h3 className="font-semibold text-slate-800">Nova Fatura Manual</h3>
                                    <button onClick={() => setIsModalOpen(false)} className="text-slate-400 hover:text-slate-600">
                                        <X className="w-5 h-5" />
                                    </button>
                                </div>
                                <form onSubmit={handleAddInvoice} className="p-6 space-y-4">
                                    <div>
                                        <label className="block text-xs font-medium text-slate-500 mb-1">Fornecedor</label>
                                        <div className="relative">
                                            <select 
                                                required 
                                                className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 appearance-none bg-white"
                                                value={newInvoiceData.supplier}
                                                onChange={e => {
                                                    const sup = suppliers.find(s => s.name === e.target.value);
                                                    setNewInvoiceData({
                                                        ...newInvoiceData, 
                                                        supplier: e.target.value,
                                                        category: sup ? sup.category : newInvoiceData.category
                                                    });
                                                }}
                                            >
                                                <option value="" disabled>Selecione um fornecedor...</option>
                                                {suppliers.map(s => (
                                                    <option key={s.id} value={s.name}>{s.name}</option>
                                                ))}
                                            </select>
                                            <ChevronDown className="absolute right-3 top-2.5 w-4 h-4 text-slate-400 pointer-events-none" />
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-xs font-medium text-slate-500 mb-1">Valor (R$)</label>
                                            <input required type="number" step="0.01" className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500"
                                                placeholder="0,00" value={newInvoiceData.amount}
                                                onChange={e => setNewInvoiceData({...newInvoiceData, amount: e.target.value})} />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-medium text-slate-500 mb-1">Vencimento</label>
                                            <input required type="date" className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500"
                                                value={newInvoiceData.dueDate}
                                                onChange={e => setNewInvoiceData({...newInvoiceData, dueDate: e.target.value})} />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-medium text-slate-500 mb-1">Empresa Pagadora</label>
                                        <select className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500"
                                            value={newInvoiceData.companyId} onChange={e => setNewInvoiceData({...newInvoiceData, companyId: e.target.value})}>
                                            {MOCK_COMPANIES.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-medium text-slate-500 mb-1">Categoria</label>
                                        <select className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500"
                                            value={newInvoiceData.category} onChange={e => setNewInvoiceData({...newInvoiceData, category: e.target.value})}>
                                            <option>Outros</option><option>Telecom</option><option>Energia</option>
                                            <option>Software</option><option>Infraestrutura</option><option>Combustível</option><option>Manutenção</option>
                                        </select>
                                    </div>
                                    <button type="submit" className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2 rounded-lg transition-colors mt-2">
                                        Cadastrar Fatura
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Modal Novo Fornecedor */}
                    {isSupplierModalOpen && (
                        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-white rounded-xl shadow-xl w-full max-w-md overflow-hidden animate-in">
                                <div className="p-4 border-b border-slate-100 flex items-center justify-between bg-slate-50">
                                    <h3 className="font-semibold text-slate-800">Novo Fornecedor</h3>
                                    <button onClick={() => setIsSupplierModalOpen(false)} className="text-slate-400 hover:text-slate-600">
                                        <X className="w-5 h-5" />
                                    </button>
                                </div>
                                <form onSubmit={handleAddSupplier} className="p-6 space-y-4">
                                    <div>
                                        <label className="block text-xs font-medium text-slate-500 mb-1">Nome / Razão Social</label>
                                        <input required type="text" className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500"
                                            placeholder="Ex: Empresa X Ltda" value={newSupplierData.name}
                                            onChange={e => setNewSupplierData({...newSupplierData, name: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-medium text-slate-500 mb-1">Categoria Principal</label>
                                        <select className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500"
                                            value={newSupplierData.category} onChange={e => setNewSupplierData({...newSupplierData, category: e.target.value})}>
                                            <option>Outros</option><option>Telecom</option><option>Energia</option>
                                            <option>Software</option><option>Infraestrutura</option><option>Combustível</option><option>Manutenção</option>
                                        </select>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-xs font-medium text-slate-500 mb-1">Telefone / Contato</label>
                                            <input type="text" className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500"
                                                placeholder="(00) 0000-0000" value={newSupplierData.contact}
                                                onChange={e => setNewSupplierData({...newSupplierData, contact: e.target.value})} />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-medium text-slate-500 mb-1">E-mail Financeiro</label>
                                            <input type="email" className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500"
                                                placeholder="fin@empresa.com" value={newSupplierData.email}
                                                onChange={e => setNewSupplierData({...newSupplierData, email: e.target.value})} />
                                        </div>
                                    </div>
                                    <button type="submit" className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2 rounded-lg transition-colors mt-2">
                                        Salvar Fornecedor
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Sidebar */}
                    <aside className="w-64 bg-slate-900 text-slate-300 flex-shrink-0 hidden md:flex flex-col">
                        <div className="p-6 border-b border-slate-700">
                            <h1 className="text-lg font-bold text-white flex items-center gap-2 tracking-tight">
                                <Building2 className="w-6 h-6 text-emerald-500" />
                                Gestão de Contas
                            </h1>
                            <p className="text-xs font-semibold text-emerald-500 mt-1 uppercase tracking-wider ml-8">LOCKS</p>
                        </div>

                        <nav className="flex-1 p-4 space-y-1">
                            {['dashboard', 'invoices', 'suppliers', 'contracts', 'webhooks'].map(tab => (
                                <button key={tab} onClick={() => setActiveTab(tab)}
                                    className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-colors capitalize ${activeTab === tab ? 'bg-emerald-600 text-white' : 'hover:bg-slate-800'}`}>
                                    {tab === 'dashboard' && <LayoutDashboard className="w-5 h-5" />}
                                    {tab === 'invoices' && <FileText className="w-5 h-5" />}
                                    {tab === 'suppliers' && <Users className="w-5 h-5" />}
                                    {tab === 'contracts' && <CreditCard className="w-5 h-5" />}
                                    {tab === 'webhooks' && <Webhook className="w-5 h-5" />}
                                    {tab === 'dashboard' ? 'Visão Geral' : tab === 'invoices' ? 'Minhas Faturas' : tab === 'suppliers' ? 'Fornecedores' : tab === 'contracts' ? 'Contratos' : 'Webhooks & API'}
                                </button>
                            ))}
                        </nav>

                        <div className="p-4 border-t border-slate-700">
                            <div className="flex items-center gap-3 px-4 py-2">
                                <div className="w-8 h-8 rounded-full bg-slate-700 flex items-center justify-center text-xs font-bold">AL</div>
                                <div>
                                    <p className="text-sm font-medium text-white">Admin Locks</p>
                                    <p className="text-xs text-slate-500">Financeiro</p>
                                </div>
                            </div>
                        </div>
                    </aside>

                    {/* Conteúdo Principal */}
                    <main className="flex-1 overflow-auto">
                        <header className="bg-white shadow-sm sticky top-0 z-10">
                            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                                <div className="flex items-center gap-4">
                                    <h2 className="text-xl font-semibold capitalize text-slate-800">
                                        {activeTab === 'webhooks' ? 'Configuração de Integrações' : activeTab === 'dashboard' ? 'Dashboard' : activeTab === 'invoices' ? 'Faturas' : activeTab === 'suppliers' ? 'Fornecedores' : 'Contratos'}
                                    </h2>
                                </div>
                                <div className="flex items-center gap-4">
                                    <div className="relative group">
                                        <Bell className="w-5 h-5 text-slate-500 hover:text-slate-700 cursor-pointer" />
                                        <span className="absolute -top-1 -right-1 w-2.5 h-2.5 bg-red-500 rounded-full border border-white"></span>
                                    </div>
                                    <button onClick={() => setIsModalOpen(true)} className="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2 transition-colors shadow-sm">
                                        <Plus className="w-4 h-4" /> Nova Despesa
                                    </button>
                                </div>
                            </div>
                        </header>

                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                            
                            {/* DASHBOARD */}
                            {activeTab === 'dashboard' && (
                                <div className="space-y-6 animate-in">
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 flex items-center justify-between">
                                            <div>
                                                <p className="text-sm font-medium text-red-600 mb-1 flex items-center gap-1"><AlertCircle className="w-4 h-4" /> Vencidos</p>
                                                <h3 className="text-2xl font-bold text-slate-900">{formatCurrency(stats.overdue)}</h3>
                                                <p className="text-xs text-slate-500 mt-1">{stats.countOverdue} faturas requerem atenção</p>
                                            </div>
                                            <div className="w-12 h-12 bg-red-50 rounded-lg flex items-center justify-center text-red-600"><AlertCircle className="w-6 h-6" /></div>
                                        </div>
                                        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 flex items-center justify-between">
                                            <div>
                                                <p className="text-sm font-medium text-amber-600 mb-1 flex items-center gap-1"><Clock className="w-4 h-4" /> A Pagar (Mês)</p>
                                                <h3 className="text-2xl font-bold text-slate-900">{formatCurrency(stats.pending)}</h3>
                                                <p className="text-xs text-slate-500 mt-1">Próximos 30 dias</p>
                                            </div>
                                            <div className="w-12 h-12 bg-amber-50 rounded-lg flex items-center justify-center text-amber-600"><Calendar className="w-6 h-6" /></div>
                                        </div>
                                        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 flex items-center justify-between">
                                            <div>
                                                <p className="text-sm font-medium text-slate-500 mb-1">Total Pago</p>
                                                <h3 className="text-2xl font-bold text-slate-900">{formatCurrency(stats.paid)}</h3>
                                                <p className="text-xs text-green-600 mt-1 flex items-center gap-1"><CheckCircle2 className="w-3 h-3" /> Atualizado hoje</p>
                                            </div>
                                            <div className="w-12 h-12 bg-slate-50 rounded-lg flex items-center justify-center text-slate-400"><DollarSign className="w-6 h-6" /></div>
                                        </div>
                                    </div>

                                    <div className="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
                                        <div className="p-6 border-b border-slate-100 flex items-center justify-between">
                                            <h3 className="font-semibold text-slate-800">Atenção Necessária</h3>
                                            <button className="text-sm text-emerald-600 font-medium hover:underline" onClick={() => setActiveTab('invoices')}>Ver todas</button>
                                        </div>
                                        <div className="divide-y divide-slate-100">
                                            {invoices.filter(i => i.status === 'overdue' || i.dueDate === '2025-01-08').map(invoice => {
                                                const company = MOCK_COMPANIES.find(c => c.id === invoice.companyId);
                                                return (
                                                    <div key={invoice.id} className="p-4 hover:bg-slate-50 transition-colors flex items-center justify-between group">
                                                        <div className="flex items-center gap-4">
                                                            <div className={`w-2 h-12 rounded-full ${invoice.status === 'overdue' ? 'bg-red-500' : 'bg-amber-500'}`}></div>
                                                            <div>
                                                                <p className="font-medium text-slate-800">{invoice.supplier}</p>
                                                                <p className="text-sm text-slate-500 flex items-center gap-2"><Building2 className="w-3 h-3" /> {company?.name} • <span className="text-xs bg-slate-100 px-1 rounded">{invoice.category}</span></p>
                                                            </div>
                                                        </div>
                                                        <div className="flex items-center gap-4">
                                                            <div className="text-right">
                                                                <p className="font-bold text-slate-800">{formatCurrency(invoice.amount)}</p>
                                                                <p className="text-xs text-red-600 font-medium">Vence: {formatDate(invoice.dueDate)}</p>
                                                            </div>
                                                            <button onClick={() => handleStatusChange(invoice.id, 'paid')} className="opacity-0 group-hover:opacity-100 transition-opacity bg-emerald-50 text-emerald-600 p-2 rounded-lg hover:bg-emerald-100"><CheckCircle2 className="w-4 h-4" /></button>
                                                        </div>
                                                    </div>
                                                )
                                            })}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* INVOICES */}
                            {activeTab === 'invoices' && (
                                <div className="space-y-6 animate-in">
                                    <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex flex-col md:flex-row gap-4 items-center justify-between">
                                        <div className="flex items-center gap-4 w-full md:w-auto">
                                            <div className="relative w-full md:w-64">
                                                <Search className="absolute left-3 top-2.5 w-4 h-4 text-slate-400" />
                                                <input type="text" placeholder="Buscar fornecedor..." className="w-full pl-10 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500"
                                                    value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                                            </div>
                                            <div className="relative">
                                                <select className="appearance-none pl-10 pr-8 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 cursor-pointer"
                                                    value={selectedCompany} onChange={(e) => setSelectedCompany(e.target.value)}>
                                                    <option value="all">Todas as Empresas</option>
                                                    {MOCK_COMPANIES.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                                                </select>
                                                <Building2 className="absolute left-3 top-2.5 w-4 h-4 text-slate-400" />
                                            </div>
                                        </div>
                                        <button className="flex items-center gap-2 text-slate-500 hover:text-slate-800 text-sm font-medium border border-slate-200 px-3 py-2 rounded-lg hover:bg-slate-50">
                                            <Download className="w-4 h-4" /> Exportar
                                        </button>
                                    </div>

                                    <div className="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
                                        <table className="w-full text-left">
                                            <thead className="bg-slate-50 border-b border-slate-100 text-xs uppercase text-slate-500 font-medium">
                                                <tr>
                                                    <th className="px-6 py-4">Fornecedor</th>
                                                    <th className="px-6 py-4">Empresa (CNPJ)</th>
                                                    <th className="px-6 py-4">Vencimento</th>
                                                    <th className="px-6 py-4">Valor</th>
                                                    <th className="px-6 py-4">Status</th>
                                                    <th className="px-6 py-4 text-right">Ação</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {filteredInvoices.map((invoice) => {
                                                    const company = MOCK_COMPANIES.find(c => c.id === invoice.companyId);
                                                    return (
                                                        <tr key={invoice.id} className="hover:bg-slate-50 transition-colors">
                                                            <td className="px-6 py-4"><p className="font-medium text-slate-800">{invoice.supplier}</p><p className="text-xs text-slate-500">{invoice.category}</p></td>
                                                            <td className="px-6 py-4"><p className="text-sm text-slate-700">{company?.name}</p><p className="text-xs text-slate-400">{company?.cnpj}</p></td>
                                                            <td className="px-6 py-4"><div className="flex items-center gap-2"><Calendar className="w-4 h-4 text-slate-400" /><span className="text-sm text-slate-700">{formatDate(invoice.dueDate)}</span></div></td>
                                                            <td className="px-6 py-4"><span className="font-medium text-slate-800">{formatCurrency(invoice.amount)}</span></td>
                                                            <td className="px-6 py-4"><StatusBadge status={invoice.status} /></td>
                                                            <td className="px-6 py-4 text-right">
                                                                <div className="flex justify-end relative">
                                                                    <select className={`appearance-none pl-3 pr-8 py-1.5 rounded-lg text-xs font-medium border cursor-pointer focus:outline-none focus:ring-2 ${invoice.status === 'paid' ? 'bg-green-50 border-green-200 text-green-700' : invoice.status === 'overdue' ? 'bg-red-50 border-red-200 text-red-700' : 'bg-slate-50 border-slate-200 text-slate-700'}`}
                                                                        value={invoice.status} onChange={(e) => handleStatusChange(invoice.id, e.target.value)}>
                                                                        <option value="pending">Pendente</option>
                                                                        <option value="paid">Pago</option>
                                                                        <option value="overdue">Atrasado</option>
                                                                    </select>
                                                                    <ChevronDown className="absolute right-2 top-2 w-3 h-3 opacity-50 pointer-events-none" />
                                                                </div>
                                                            </td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            {/* SUPPLIERS */}
                            {activeTab === 'suppliers' && (
                                <div className="space-y-6 animate-in">
                                    <div className="flex justify-between items-center bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                                        <div>
                                            <h3 className="text-lg font-bold text-slate-800">Fornecedores Cadastrados</h3>
                                            <p className="text-sm text-slate-500">Gerencie contatos e dados bancários de seus parceiros.</p>
                                        </div>
                                        <button onClick={() => setIsSupplierModalOpen(true)} className="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2 transition-colors">
                                            <Plus className="w-4 h-4" /> Novo Fornecedor
                                        </button>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                        {filteredSuppliers.map(sup => (
                                            <div key={sup.id} className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 hover:shadow-md transition-shadow group relative">
                                                <div className="flex justify-between items-start mb-4">
                                                    <div className="w-10 h-10 bg-slate-100 rounded-lg flex items-center justify-center text-slate-500 font-bold text-lg">
                                                        {sup.name.charAt(0)}
                                                    </div>
                                                    <span className="text-xs px-2 py-1 bg-emerald-50 text-emerald-700 rounded-full border border-emerald-100">Ativo</span>
                                                </div>
                                                <h4 className="font-bold text-slate-800 mb-1">{sup.name}</h4>
                                                <p className="text-xs text-slate-500 mb-4 bg-slate-50 inline-block px-2 py-1 rounded">{sup.category}</p>
                                                
                                                <div className="space-y-2 pt-4 border-t border-slate-50">
                                                    <div className="flex items-center gap-2 text-sm text-slate-600">
                                                        <Phone className="w-4 h-4 text-slate-400" />
                                                        {sup.contact}
                                                    </div>
                                                    <div className="flex items-center gap-2 text-sm text-slate-600">
                                                        <Mail className="w-4 h-4 text-slate-400" />
                                                        {sup.email}
                                                    </div>
                                                </div>
                                                <button className="absolute top-4 right-4 text-slate-300 hover:text-emerald-600">
                                                    <MoreVertical className="w-5 h-5" />
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* WEBHOOKS */}
                            {activeTab === 'webhooks' && (
                                <div className="space-y-6 animate-in">
                                    <div className="bg-slate-900 rounded-xl p-8 text-white relative overflow-hidden">
                                        <div className="relative z-10 max-w-2xl">
                                            <h3 className="text-2xl font-bold mb-2">Automação de Alertas</h3>
                                            <p className="text-slate-400 mb-6">Integração com N8N, Zapier ou sistemas internos.</p>
                                            <button className="bg-emerald-500 hover:bg-emerald-600 text-white px-6 py-2 rounded-lg font-medium transition-colors">Adicionar Novo Webhook</button>
                                        </div>
                                        <Webhook className="absolute right-0 top-0 w-64 h-64 text-slate-800 transform translate-x-12 -translate-y-12 opacity-50" />
                                    </div>
                                    <div className="grid grid-cols-1 gap-4">
                                        {MOCK_WEBHOOKS.map(hook => (
                                            <div key={hook.id} className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 flex items-start justify-between">
                                                <div className="flex gap-4">
                                                    <div className={`mt-1 w-10 h-10 rounded-lg flex items-center justify-center ${hook.active ? 'bg-emerald-100 text-emerald-600' : 'bg-slate-100 text-slate-400'}`}><Webhook className="w-5 h-5" /></div>
                                                    <div>
                                                        <h4 className="font-semibold text-slate-800">{hook.name}</h4>
                                                        <code className="block mt-1 text-xs text-slate-500 bg-slate-50 px-2 py-1 rounded border border-slate-100 font-mono">{hook.url}</code>
                                                    </div>
                                                </div>
                                                <div className="text-right">
                                                    <button onClick={() => handleTestWebhook(hook.id)} disabled={testingWebhookId === hook.id} className="text-xs text-emerald-600 hover:text-emerald-700 border border-emerald-200 px-3 py-1.5 rounded hover:bg-emerald-50 flex items-center gap-1 min-w-[70px] justify-center ml-auto">
                                                        {testingWebhookId === hook.id ? <Loader2 className="w-3 h-3 animate-spin" /> : 'Testar'}
                                                    </button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                            
                            {/* CONTRACTS */}
                            {activeTab === 'contracts' && (
                                <div className="flex flex-col items-center justify-center py-20 bg-white rounded-xl border border-dashed border-slate-300 animate-in">
                                    <div className="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mb-4"><CreditCard className="w-8 h-8 text-slate-300" /></div>
                                    <h3 className="text-lg font-medium text-slate-900">Gestão de Recorrência</h3>
                                    <button className="mt-6 text-emerald-600 font-medium hover:underline flex items-center gap-1"><Plus className="w-4 h-4" /> Cadastrar primeiro contrato</button>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
